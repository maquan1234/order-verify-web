# Render 一键部署配置
# 部署后到 Render 后台 Environment 填入下面 8 个环境变量（sync:false = 不随仓库，需手动在后台粘贴）
services:
  - type: web
    name: order-verify-web
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: WECOM_ENABLED
        sync: false
      - key: WECOM_CORPID
        sync: false
      - key: WECOM_SECRET
        sync: false
      - key: WECOM_AGENTID
        sync: false
      - key: WECOM_TOKEN
        sync: false
      - key: WECOM_AES_KEY
        sync: false
      - key: WECOM_WEBHOOK_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
